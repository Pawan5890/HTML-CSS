<!DOCTYPE html>
<!--
CSS Day1 -->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--========================-->
    <!--Internal CSS-->
    <!--========================-->
    <style>
        .internal-example{
            color: blue;
            font-size: 20px;
            font-weight: 600;
            background-color: yellow;
        }
        .sec{
            background-color: aqua;
        }
    </style>

</head>
<body>
    <section class="sec">
    <h2>CSS Example</h2>
     <!--========================-->
    <!--Internal CSS-->
    <!--========================-->
    <p class="internal-example">
        This is an example of internal CSS.</p>
    </section>
    <hr>
    <!--========================-->
    <!--In line CSS-->
    <!--========================-->
    <h2>Inline CSS Example</h2>
    <p style="color: red;background-color: rgb(235, 219, 3); font-size: 18px;">
        This is an example of inline CSS.

    </p>
<!--========================-->
<!--External CSS-->
<!--========================-->
    <h2>External CSS Example</h2>
    <p class="external-example">
        This is an example of external CSS.
</body>
</html>
